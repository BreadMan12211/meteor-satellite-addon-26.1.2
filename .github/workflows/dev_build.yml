name: Publish Development Build
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Wrapper Validation
        uses: gradle/actions/wrapper-validation@v3
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: adopt
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Extract Minecraft Version
        id: mc_version
        run: |
          MC_VERSION=$(grep 'minecraft_version' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "minecraft_version='$MC_VERSION'" >> $GITHUB_OUTPUT
          echo "Minecraft version: $MC_VERSION"
      - name: Find Next Build Version
        id: find_build_version
        run: |
          TAGS=$(curl -s "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases" | jq -r '.[].tag_name')
          echo "Tags: $TAGS"

          MATCHING=$(echo "$TAGS" | grep "${{ steps.mc_version.outputs.minecraft_version }}-" || echo "")
          echo "Matching tags: $MATCHING"

          if [ -z "$MATCHING" ]; then
            BUILD_VERSION=1
          else
            LAST_BUILD=$(echo "$MATCHING" | sed "s/[^0-9]*\([0-9]*-[0-9]*\)/\1/" | cut -d'-' -f2)
            BUILD_VERSION=$((LAST_BUILD + 1))
          fi

          echo "build_version='$BUILD_VERSION'" >> $GITHUB_OUTPUT
          echo "Build version: $BUILD_VERSION"
      - name: Build with Gradle
        run: ./gradlew build -PbuildNumber=${{ steps.find_build_version.outputs.build_version }}
      - name: Remove unwanted files
        run: rm ./build/libs/*-all.jar
      - name: Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: '${{ secrets.GITHUB_TOKEN }}'
          automatic_release_tag: latest, ${{ steps.mc_version.outputs.minecraft_version }}-${{ steps.find_build_version.outputs.build_version }}
          prerelease: false
          title: Dev Build
          files: |
            ./build/libs/*.jar
